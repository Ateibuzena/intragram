global:
  resolve_timeout: 5m

route:
  receiver: 'email-alerts'
  group_by: ['alertname', 'job', 'instance', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: 'email-alerts'
      group_wait: 10s
      repeat_interval: 1h
    - matchers:
        - severity="warning"
      receiver: 'email-alerts'
      group_wait: 30s
      repeat_interval: 6h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'job', 'instance']

templates:
  - /etc/alertmanager/templates/*.tmpl

receivers:
  - name: 'email-alerts'
    email_configs:
      - to: '${ALERTMANAGER_EMAIL_TO}'
        from: '${ALERTMANAGER_EMAIL_FROM}'
        smarthost: '${ALERTMANAGER_SMARTHOST}'
        auth_username: '${ALERTMANAGER_EMAIL_USERNAME}'
        auth_password: '${ALERTMANAGER_EMAIL_PASSWORD}'
        require_tls: true
        send_resolved: true
        headers:
          Subject: '{{ template "email.subject" . }}'
