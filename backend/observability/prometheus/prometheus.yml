global:
  scrape_interval: 10s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nestjs_app'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:3000', 'auth-service:3003', 'users-service:3006', 'chat-service:3009']

  - job_name: 'node_exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres_exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']