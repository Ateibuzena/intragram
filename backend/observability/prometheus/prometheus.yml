global:
  scrape_interval: 10s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'nestjs_app'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:3000', 'auth-service:3003', 'users-service:3006', 'chat-service:3009']

  - job_name: 'node_exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres_exporter_auth'
    metrics_path: /metrics
    static_configs:
      - targets: ['postgres-exporter-auth:9187']

  - job_name: 'postgres_exporter_users'
    metrics_path: /metrics
    static_configs:
      - targets: ['postgres-exporter-users:9187']

  - job_name: 'postgres_exporter_chat'
    metrics_path: /metrics
    static_configs:
      - targets: ['postgres-exporter-chat:9187']

  - job_name: 'nginx_exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']