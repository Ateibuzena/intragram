services:

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - frontend-net
    restart: unless-stopped

  # ==============================
  # MONITOREO (OPCIONAL)
  # ==============================
  prometheus:
    container_name: prometheus
    build:
      context: ./backend/observability/prometheus
      dockerfile: Dockerfile
    networks:
      - backend-net
      - service-net
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.external-url=https://localhost:8443/prometheus/
      - --web.route-prefix=/
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./backend/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/observability/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qS", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  alertmanager:
    container_name: alertmanager
    image: prom/alertmanager:v0.31.0
    ports:
      - "9093:9093"
    volumes:
      - ./backend/observability/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    networks:
      - backend-net
    restart: unless-stopped

  postgres-exporter-auth:
    container_name: postgres-exporter-auth
    image: wrouesnel/postgres_exporter:v0.10.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}
    networks:
      - service-net
    restart: unless-stopped

  postgres-exporter-users:
    container_name: postgres-exporter-users
    image: wrouesnel/postgres_exporter:v0.10.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${USERS_DB_USER}:${USERS_DB_PASSWORD}@users-db:5432/${USERS_DB_NAME}
    networks:
      - service-net
    restart: unless-stopped

  postgres-exporter-chat:
    container_name: postgres-exporter-chat
    image: wrouesnel/postgres_exporter:v0.10.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${CHAT_DB_USER}:${CHAT_DB_PASSWORD}@chat-db:5432/${CHAT_DB_NAME}
    networks:
      - service-net
    restart: unless-stopped

  nginx-exporter:
    container_name: nginx-exporter
    image: nginx/nginx-prometheus-exporter:1.3.0
    command:
      - --nginx.scrape-uri=http://nginx:8080/stub_status
    networks:
      - backend-net
    depends_on:
      - nginx
    restart: unless-stopped

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.5.0
    networks:
      - service-net
    restart: unless-stopped

  grafana:
    container_name: grafana
    build:
      context: ./backend/observability/grafana
      dockerfile: Dockerfile
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: 3001
      GF_SERVER_ROOT_URL: /grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      retries: 5
    depends_on:
      - prometheus
    networks:
      - backend-net
      - service-net
    restart: unless-stopped

  # ==============================
  # BASES DE DATOS
  # ==============================
  auth-db:
    container_name: auth-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - service-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  users-db:
    container_name: users-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB_NAME}
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - service-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_DB_USER} -d ${USERS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  chat-db:
    container_name: chat-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${CHAT_DB_USER}
      POSTGRES_PASSWORD: ${CHAT_DB_PASSWORD}
      POSTGRES_DB: ${CHAT_DB_NAME}
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    networks:
      - service-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHAT_DB_USER} -d ${CHAT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ==============================
  # MICROSERVICIOS
  # ==============================
  chat-service:
    container_name: chat-service
    build:
      context: ./backend
      dockerfile: services/chat/Dockerfile.dev
    environment:
      NODE_ENV: ${NODE_ENV}
      DB_HOST: chat-db
      DB_PORT: 5432
      DB_USERNAME: ${CHAT_DB_USER}
      DB_PASSWORD: ${CHAT_DB_PASSWORD}
      DB_DATABASE: ${CHAT_DB_NAME}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
    volumes:
      - ./backend/services/chat/src:/app/services/chat/src
      - ./backend/shared:/app/shared
      - /app/node_modules
    networks:
      - service-net
    depends_on:
      chat-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://chat-service:3009/chat/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  auth-service:
    container_name: auth-service
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile.dev
    environment:
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_42_CLIENT_ID: ${OAUTH_42_CLIENT_ID}
      OAUTH_42_CLIENT_SECRET: ${OAUTH_42_CLIENT_SECRET}
      OAUTH_42_REDIRECT_URI: ${OAUTH_42_REDIRECT_URI}
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USERNAME: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_DATABASE: ${AUTH_DB_NAME}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
    volumes:
      - ./backend/services/auth/src:/app/services/auth/src
      - ./backend/shared:/app/shared
      - /app/node_modules
    networks:
      - service-net
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://auth-service:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  users-service:
    container_name: users-service
    build:
      context: ./backend
      dockerfile: services/users/Dockerfile.dev
    environment:
      PORT: 3006
      NODE_ENV: ${NODE_ENV}
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USERNAME: ${USERS_DB_USER}
      DB_PASSWORD: ${USERS_DB_PASSWORD}
      DB_DATABASE: ${USERS_DB_NAME}
    volumes:
      - ./backend/services/users/src:/app/services/users/src
      - ./backend/shared:/app/shared
      - /app/node_modules
    networks:
      - service-net
    depends_on:
      users-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://users-service:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ==============================
  # API GATEWAY (solo interno)
  # ==============================
  gateway:
    container_name: gateway
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile.dev
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL}
      GRAFANA_URL: ${GRAFANA_URL}
    volumes:
      - ./backend/gateway/src:/app/gateway/src
      - ./backend/shared:/app/shared
      - /app/node_modules
    networks:
      - backend-net
      - service-net
    depends_on:
      - auth-service
      - users-service
      - chat-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://gateway:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ==============================
  # NGINX - PUNTO DE ENTRADA ABSOLUTO
  # ==============================
  nginx:
    container_name: nginx
    build:
      context: ./backend/nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./backend/nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-net
      - frontend-net
    depends_on:
      - frontend
      - gateway
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

# ==============================
# REDES
# ==============================
networks:
  backend-net:
    driver: bridge
  service-net:
    driver: bridge
  frontend-net:
    driver: bridge

# ==============================
# VOLUMENES PERSISTENTES
# ==============================
volumes:
  auth-db-data:
    name: auth-db-data
  users-db-data:
    name: users-db-data
  chat-db-data:
    name: chat-db-data
  grafana-data:
    name: grafana-data
  prometheus-data:
    name: prometheus-data
