services:
  # ===========================================
  # HERRAMIENTAS DE MONITOREO (OPCIONAL)
  # ===========================================
  prometheus:
    container_name: prometheus
    build:
        context: ./backend/observability/prometheus
        dockerfile: Dockerfile
    ports:
        - "9090:9090"
    networks:
        - service-net
    restart: unless-stopped

  grafana:
    container_name: grafana
    build:
        context: ./backend/observability/grafana
        dockerfile: Dockerfile
    ports:
        - "3001:3000"
    depends_on:
        - prometheus
    networks:
        - service-net
    restart: unless-stopped

  # ===========================================
  # MICROSERVICIOS
  # ===========================================

  example-service:
    container_name: example-service
    build:
      context: ./backend/services/example
      dockerfile: Dockerfile.dev
    environment:
      SERVICE_URL: http://example-service:3005
    volumes:
      - ./backend/services/example/src:/app/src
      - /app/node_modules
    ports:
      - "3005:3005"
    networks:
      - service-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://example-service:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ===========================================
  # API GATEWAY
  # ===========================================

  gateway:
    container_name: gateway
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3000
    
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Rate limiting
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}      

      # URLs de microservicios internos (usar nombre de servicio Docker)
      EXAMPLE_SERVICE_URL: http://example-service:3005
      GRAFANA_URL: http://grafana:3001
      AUTH_SERVICE_URL: http://auth-service:3003
      CHAT_SERVICE_URL: http://chat-service:3004

    volumes:
      - ./backend/gateway/src:/app/src
      - /app/node_modules
    networks:
      - backend-net
      - service-net
    depends_on:
      - example-service
      - grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://gateway:3000/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ===========================================
  # NGINX - REVERSE PROXY
  # ===========================================

  nginx:
    container_name: nginx
    build:
      context: ./backend/nginx
      dockerfile: Dockerfile
    ports:
      - "8443:443"
    volumes:
      - ./backend/nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - backend-net
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# ===========================================
# REDES
# ===========================================

networks:
  backend-net:
    driver: bridge
    name: backend-net
  service-net:
    driver: bridge
    name: service-net

# ===========================================
# VOLÚMENES PERSISTENTES
# ===========================================

volumes:
  nginx-logs:
    name: nginx-logs
