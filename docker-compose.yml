services:
  # ===========================================
  # HERRAMIENTAS DE MONITOREO (OPCIONAL)
  # ===========================================
  prometheus:
    container_name: prometheus
    build:
        context: ./backend/observability/prometheus
        dockerfile: Dockerfile
    networks:
        - backend-net
        - service-net
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=https://localhost:8443/prometheus/
      - --web.route-prefix=/
    restart: unless-stopped

  grafana:
    container_name: grafana
    build:
        context: ./backend/observability/grafana
        dockerfile: Dockerfile
    environment:
      GF_SERVER_HTTP_PORT: 3001
      GF_SERVER_ROOT_URL: https://localhost:8443/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    depends_on:
        - prometheus
    networks:
        - backend-net
        - service-net
    restart: unless-stopped

  # ===========================================
  # BASES DE DATOS
  # ===========================================

  auth-db:
    container_name: auth-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - service-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth_user} -d ${AUTH_DB_NAME:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===========================================
  # MICROSERVICIOS
  # ===========================================

  auth-service:
    container_name: auth-service
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile.dev
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USERNAME: ${AUTH_DB_USER:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
      DB_DATABASE: ${AUTH_DB_NAME:-auth_db}
    volumes:
      - ./backend/services/auth/src:/app/src
      - /app/node_modules
    networks:
      - service-net
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://auth-service:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  example-service:
    container_name: example-service
    build:
      context: ./backend/services/example
      dockerfile: Dockerfile.dev
    environment:
      SERVICE_URL: ${EXAMPLE_SERVICE_URL:-http://example-service:3005}
    volumes:
      - ./backend/services/example/src:/app/src
      - /app/node_modules
    networks:
      - service-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://example-service:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ===========================================
  # API GATEWAY
  # ===========================================

  gateway:
    container_name: gateway
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${GATEWAY_PORT:-3000}
    
      JWT_SECRET: ${JWT_SECRET}
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN}
      # Rate limiting
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}

      # URLs de microservicios internos (usar nombre de servicio Docker)
      EXAMPLE_SERVICE_URL: ${EXAMPLE_SERVICE_URL:-http://example-service:3005}
      GRAFANA_URL: ${GRAFANA_URL:-http://grafana:3001}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3003}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://chat-service:3004}

    volumes:
      - ./backend/gateway/src:/app/src
      - /app/node_modules
    networks:
      - backend-net
      - service-net
    depends_on:
      - example-service
      - auth-service
      - grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://gateway:3000/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ===========================================
  # NGINX - REVERSE PROXY
  # ===========================================

  nginx:
    container_name: nginx
    build:
      context: ./backend/nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./backend/nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - backend-net
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# ===========================================
# REDES
# ===========================================

networks:
  backend-net:
    driver: bridge
    name: backend-net
  service-net:
    driver: bridge
    name: service-net

# ===========================================
# VOLÚMENES PERSISTENTES
# ===========================================

volumes:
  nginx-logs:
    name: nginx-logs
  auth-db-data:
    name: auth-db-data
